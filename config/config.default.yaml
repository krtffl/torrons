##############################################################
# Global server configuration
##############################################################
port: "3000"

##############################################################
# Database
##############################################################
database:
  host: localhost
  port: 5432
  user: myUser
  password: myPassword
  name: databaseName
  ssl: disable #require, verify-full, verify-ca, disable  

##############################################################
# Logger
##############################################################
logger:
  format: json
  level: info
  path: logs/torro.log

##############################################################
# Admin
##############################################################
admin_token: "" # Required for POST /bracket/{classId}/create and /bracket/{bracketId}/advance. Set via ADMIN_TOKEN env var; endpoints reject all requests while empty.
