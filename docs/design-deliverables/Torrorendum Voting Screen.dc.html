<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&display=swap">
<style>
  body{margin:0;background:#E7E0D0;background-image:radial-gradient(1100px 560px at 50% -6%,rgba(255,250,241,.6),rgba(231,224,208,0) 68%);background-attachment:fixed;font-family:'Newsreader',serif}
  @keyframes torrVsPulse{0%{box-shadow:0 0 0 0 rgba(138,38,56,.35)}100%{box-shadow:0 0 0 14px rgba(138,38,56,0)}}
</style>
</helmet>

<div style="max-width:480px;margin:0 auto;background:#FBF2E3;min-height:100vh;box-shadow:0 0 60px rgba(58,42,28,.12);position:relative;overflow:hidden;display:flex;flex-direction:column" data-screen-label="Voting Screen">

  <dc-import name="Torrorendum Nav Bar" active-link="vota" hint-size="100%,72px"></dc-import>

  <!-- HEADER -->
  <div style="padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:16px;height:16px;border-left:3px solid #3A2A1C;border-bottom:3px solid #3A2A1C;transform:rotate(45deg)"></div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11px;letter-spacing:.8px;color:#8A7458">CLÀSSICS · RONDA OBERTA</div>
    </div>
    <dc-import name="Torrorendum Streak Indicator" days="{{ streak }}" demo-controls="{{ false }}" hint-size="90,32"></dc-import>
  </div>

  <!-- PROGRESS TOWARD UNLOCK -->
  <div style="padding:16px 24px 0">
    <div style="display:flex;justify-content:space-between;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:10.5px;color:#8A7458;letter-spacing:.3px">
      <span>{{ current }} de {{ total }} vots</span>
      <span>per desbloquejar el resultat</span>
    </div>
    <div style="height:8px;border-radius:999px;background:#F0DFC2;margin-top:7px;overflow:hidden">
      <div style="height:100%;border-radius:999px;background:#E0923F;transition:width .5s ease;width:{{ progressPct }}"></div>
    </div>
  </div>

  <!-- DUEL -->
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:28px 20px">
    <div style="position:relative;display:flex;gap:8px;width:100%;max-width:432px">

      <div onClick="{{ voteA }}" style="{{ cardStyleA }}">
        <div style="position:relative">
          <div style="width:100%;height:150px;border-radius:14px;background:#F1EFEA;border:1px solid #E3E0D6;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden">
            <div style="width:52px;height:96px;border-radius:6px;background:#E4E1D8;border:1px solid #D8D4C6"></div>
            <div style="position:absolute;top:7px;left:7px;font:600 6.5px ui-monospace,Menlo,monospace;color:#A79C8A">foto producte</div>
          </div>
          <div style="position:absolute;top:-8px;left:-8px;background:#8A2638;color:#FFFAF1;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:9px;padding:4px 9px;border-radius:999px;transform:rotate(-8deg);box-shadow:1px 2px 0 rgba(58,42,28,.2)">NOU</div>
          <sc-if value="{{ isChosenA }}" hint-placeholder-val="{{ false }}">
            <div style="position:absolute;bottom:8px;right:8px;width:26px;height:26px;border-radius:50%;background:#8A2638;display:flex;align-items:center;justify-content:center">
              <div style="width:11px;height:6px;border-left:2.5px solid #FFFAF1;border-bottom:2.5px solid #FFFAF1;transform:rotate(-45deg) translate(1px,-1px)"></div>
            </div>
          </sc-if>
        </div>
        <div style="padding:12px 4px 4px">
          <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;color:#3A2A1C">Torró A</div>
          <div style="display:flex;align-items:center;gap:5px;margin-top:8px">
            <div style="width:7px;height:7px;border-radius:2px;background:#E0923F"></div>
            <div style="width:7px;height:7px;border-radius:2px;background:#E0923F"></div>
            <div style="width:7px;height:7px;border-radius:2px;background:#E0923F"></div>
            <div style="font:600 9px ui-monospace,Menlo,monospace;color:#8A7458;margin-left:2px">cruixent</div>
          </div>
          <div style="display:flex;gap:5px;margin-top:8px">
            <div style="width:19px;height:19px;border-radius:50%;border:1px solid #D8C097;display:flex;align-items:center;justify-content:center;font:600 8px ui-monospace,Menlo,monospace;color:#8A7458">A</div>
            <div style="width:19px;height:19px;border-radius:50%;border:1px solid #D8C097;display:flex;align-items:center;justify-content:center;font:600 7px ui-monospace,Menlo,monospace;color:#8A7458">LL</div>
          </div>
        </div>
      </div>

      <div style="position:absolute;left:50%;top:150px;transform:translate(-50%,-50%) rotate(-6deg);width:52px;height:52px;border-radius:50%;background:#8A2638;display:flex;align-items:center;justify-content:center;z-index:3;animation:torrVsPulse 2.2s ease-out infinite">
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;color:#FFFAF1">VS</div>
      </div>

      <div onClick="{{ voteB }}" style="{{ cardStyleB }}">
        <div style="position:relative">
          <div style="width:100%;height:150px;border-radius:14px;background:#F1EFEA;border:1px solid #E3E0D6;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden">
            <div style="width:52px;height:96px;border-radius:6px;background:#E4E1D8;border:1px solid #D8D4C6"></div>
            <div style="position:absolute;top:7px;left:7px;font:600 6.5px ui-monospace,Menlo,monospace;color:#A79C8A">foto producte</div>
          </div>
          <sc-if value="{{ isChosenB }}" hint-placeholder-val="{{ false }}">
            <div style="position:absolute;bottom:8px;right:8px;width:26px;height:26px;border-radius:50%;background:#8A2638;display:flex;align-items:center;justify-content:center">
              <div style="width:11px;height:6px;border-left:2.5px solid #FFFAF1;border-bottom:2.5px solid #FFFAF1;transform:rotate(-45deg) translate(1px,-1px)"></div>
            </div>
          </sc-if>
        </div>
        <div style="padding:12px 4px 4px">
          <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;color:#3A2A1C">Torró B</div>
          <div style="display:flex;align-items:center;gap:5px;margin-top:8px">
            <div style="width:7px;height:7px;border-radius:2px;background:#E0923F"></div>
            <div style="width:7px;height:7px;border-radius:2px;background:#EAD9BC"></div>
            <div style="width:7px;height:7px;border-radius:2px;background:#EAD9BC"></div>
            <div style="font:600 9px ui-monospace,Menlo,monospace;color:#8A7458;margin-left:2px">suau</div>
          </div>
          <div style="display:flex;gap:5px;margin-top:8px">
            <div style="width:19px;height:19px;border-radius:50%;border:1px solid #D8C097;display:flex;align-items:center;justify-content:center;font:600 8px ui-monospace,Menlo,monospace;color:#8A7458">A</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- POST-VOTE TOAST -->
  <sc-if value="{{ voted }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;left:20px;right:20px;bottom:24px;background:#3A2A1C;border-radius:16px;padding:14px 18px;box-shadow:0 10px 26px rgba(58,42,28,.28)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:12px;color:#FFFAF1">Vot registrat</div>
        <div style="font-family:'Newsreader',serif;font-style:italic;font-size:11.5px;color:#D8C7A8">propera ronda…</div>
      </div>
      <div style="height:5px;border-radius:999px;background:rgba(255,250,241,.18);margin-top:9px;overflow:hidden">
        <div style="height:100%;border-radius:999px;background:#EFC26E;transition:width .9s linear;width:{{ toastFillPct }}"></div>
      </div>
    </div>
  </sc-if>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { voted: false, chosen: null, fillActive: false, streak: 5, current: 8, total: 20 };

  vote(id) {
    if (this.state.voted) return;
    this.setState({ voted: true, chosen: id, fillActive: false, streak: this.state.streak + 1, current: Math.min(this.state.total, this.state.current + 1) });
    this._fillT = setTimeout(() => this.setState({ fillActive: true }), 30);
    this._resetT = setTimeout(() => this.setState({ voted: false, chosen: null, fillActive: false }), 1150);
  }

  componentWillUnmount() {
    clearTimeout(this._fillT);
    clearTimeout(this._resetT);
  }

  renderVals() {
    const s = this.state;
    const base = 'flex:1;min-width:0;border-radius:16px;cursor:pointer;transition:transform .25s ease,opacity .25s ease,filter .25s ease;';
    const cardStyle = (id) => {
      if (!s.voted) return base + 'transform:scale(1);opacity:1;filter:none;';
      if (s.chosen === id) return base + 'transform:scale(1.035);opacity:1;filter:none;';
      return base + 'transform:scale(.97);opacity:.45;filter:grayscale(.4);';
    };

    return {
      voted: s.voted,
      isChosenA: s.voted && s.chosen === 'a',
      isChosenB: s.voted && s.chosen === 'b',
      cardStyleA: cardStyle('a'),
      cardStyleB: cardStyle('b'),
      streak: s.streak,
      current: s.current,
      total: s.total,
      progressPct: Math.round((s.current / s.total) * 100) + '%',
      toastFillPct: s.fillActive ? '100%' : '0%',
      voteA: () => this.vote('a'),
      voteB: () => this.vote('b'),
    };
  }
}

</script>
</body>
</html>
