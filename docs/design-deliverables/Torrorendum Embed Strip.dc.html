<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap">
<style>
  html,body{margin:0;padding:0;background:transparent}
  *{box-sizing:border-box}
  @keyframes torrEmbedPulse{0%{box-shadow:0 0 0 0 rgba(138,38,56,.35)}100%{box-shadow:0 0 0 6px rgba(138,38,56,0)}}
  .torr-strip-credit:hover{opacity:1 !important}
</style>
</helmet>

<div style="width:100%;max-width:420px;background:{{ t.card }};border:1.5px solid {{ t.border }};border-radius:18px;box-shadow:0 4px 16px rgba(58,42,28,.14),0 2px 0 {{ t.border }};font-family:'Newsreader',Georgia,serif;overflow:hidden" data-screen-label="Embed Strip">

  <!-- brand header row = the persistent credit link -->
  <a href="https://torrorendum.cat" target="_blank" rel="noopener" class="torr-strip-credit" style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 14px;text-decoration:none;border-bottom:1px solid {{ t.border }};opacity:.92">
    <div style="display:flex;align-items:center;gap:7px;min-width:0">
      <div style="width:17px;height:17px;border-radius:50%;background:#8A2638;display:flex;align-items:center;justify-content:center;flex:none">
        <div style="width:5.5px;height:5.5px;border-radius:50%;background:#EFC26E"></div>
      </div>
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:13.5px;color:{{ t.ink }};white-space:nowrap">torrorèndum</span>
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:9.5px;letter-spacing:.4px;color:{{ t.inkMuted }};white-space:nowrap">· top 3</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px;background:#E0923F;color:#3A2A1C;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:9px;padding:4px 9px;border-radius:999px;flex:none">
      <sc-if value="{{ t.showLive }}" hint-placeholder-val="{{ true }}">
        <div style="width:5px;height:5px;border-radius:50%;background:#3A2A1C;animation:torrEmbedPulse 2s ease-out infinite"></div>
      </sc-if>
      EN VIU
    </div>
  </a>

  <!-- top 3, side by side -->
  <div style="display:flex;gap:8px;padding:12px 14px 14px">
    <sc-for list="{{ items }}" as="it" hint-placeholder-count="3">
      <div style="{{ it.cellStyle }}">
        <div style="{{ it.badgeStyle }}">{{ it.rank }}</div>
        <div style="{{ it.swatchStyle }}"></div>
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11.5px;color:{{ it.nameColor }};line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center;margin-top:6px">{{ it.name }}</div>
        <div style="font:600 9.5px ui-monospace,Menlo,monospace;color:{{ it.metaColor }};margin-top:2px">{{ it.metaText }}</div>
      </div>
    </sc-for>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:150},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;light&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;tsType&quot;:&quot;'light'|'dark'&quot;,&quot;section&quot;:&quot;Appearance&quot;},&quot;showVotes&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;showLiveBadge&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Content&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const isDark = this.props.theme === 'dark';
    const t = isDark
      ? { bg: '#1E1712', card: '#29201A', ink: '#F7EAD3', inkMuted: '#C2AD8C', border: '#4E3C28', showLive: this.props.showLiveBadge !== false }
      : { bg: '#FBF2E3', card: '#FFFAF1', ink: '#3A2A1C', inkMuted: '#8A7458', border: '#E8D6B4', showLive: this.props.showLiveBadge !== false };

    const showVotes = this.props.showVotes !== false;

    const raw = [
      { rank: 1, name: "Torró d'Agramunt", votes: '8.412 vots', elo: '1928 ELO' },
      { rank: 2, name: 'Torró de Xixona', votes: '7.988 vots', elo: '1901 ELO' },
      { rank: 3, name: 'Torró dur', votes: '6.205 vots', elo: '1844 ELO' },
    ];

    const cellBase = 'flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;border-radius:12px;padding:10px 6px 9px';

    const items = raw.map(r => {
      const isFirst = r.rank === 1;
      return {
        rank: r.rank,
        name: r.name,
        metaText: showVotes ? r.votes : r.elo,
        cellStyle: cellBase + (isFirst ? `;background:#8A2638;border:1.5px solid #EFC26E` : `;background:${t.bg};border:1.5px solid ${t.border}`),
        badgeStyle: `width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:10px;flex:none;` + (isFirst ? 'background:#EFC26E;color:#3A2A1C' : r.rank === 2 ? `background:#EFC26E;color:#3A2A1C` : `background:#B96F26;color:#FFFAF1`),
        swatchStyle: `width:100%;height:38px;border-radius:8px;margin-top:7px;border:1px solid ${isFirst ? 'rgba(239,194,110,.5)' : t.border};background:` + (isFirst
          ? 'repeating-linear-gradient(135deg,rgba(255,250,241,.14),rgba(255,250,241,.14) 6px,rgba(255,250,241,.05) 6px,rgba(255,250,241,.05) 12px)'
          : 'repeating-linear-gradient(135deg,#F0DFC2,#F0DFC2 6px,#E2CB9E 6px,#E2CB9E 12px)'),
        nameColor: isFirst ? '#FFFAF1' : t.ink,
        metaColor: isFirst ? '#EFC26E' : t.inkMuted,
      };
    });

    return { t, items };
  }
}

</script>
</body>
</html>
