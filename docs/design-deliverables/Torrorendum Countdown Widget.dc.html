<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&display=swap">
<style>
  body{margin:0;background:#E7E0D0;background-image:radial-gradient(1100px 560px at 50% -6%,rgba(255,250,241,.6),rgba(231,224,208,0) 68%);background-attachment:fixed;font-family:'Newsreader',serif}
</style>
</helmet>

<div style="max-width:440px;margin:0 auto;background:#3A2A1C;border-radius:24px;padding:26px 24px;position:relative;overflow:hidden" data-screen-label="Countdown Widget">
  <div style="position:absolute;top:-30px;right:-30px;width:110px;height:110px;border-radius:50%;background:rgba(239,194,110,.14)"></div>

  <sc-if value="{{ isOpenPhase }}" hint-placeholder-val="{{ true }}">
    <div style="display:flex;align-items:center;gap:7px">
      <div style="width:7px;height:7px;border-radius:50%;background:#E0923F;flex:none"></div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;color:#E0923F">TEMPORADA OBERTA · CAP A LES ELIMINATÒRIES</div>
    </div>
    <div style="font-family:'Newsreader',serif;font-style:italic;font-size:15px;color:#E7DCC5;margin-top:8px">{{ countDays }} dies fins al pas a eliminatòries.</div>
  </sc-if>
  <sc-if value="{{ isBracketPhase }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex;align-items:center;gap:7px">
      <div style="width:7px;height:7px;border-radius:50%;background:#EFC26E;flex:none"></div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;color:#EFC26E">GRAN FINAL · DIA DE REIS</div>
    </div>
    <div style="font-family:'Newsreader',serif;font-style:italic;font-size:15px;color:#E7DCC5;margin-top:8px">{{ countDays }} dies fins a la gran final. Un torró, un guanyador.</div>
  </sc-if>

  <div style="display:flex;gap:10px;margin-top:20px">
    <div style="flex:1;background:#FFFAF1;border-radius:14px;padding:12px 6px;text-align:center;transform:rotate(-2deg)">
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:26px;color:#3A2A1C">{{ countDays }}</div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:9px;letter-spacing:1px;color:#8A7458;margin-top:2px">DIES</div>
    </div>
    <div style="flex:1;background:#FFFAF1;border-radius:14px;padding:12px 6px;text-align:center;transform:rotate(1deg)">
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:26px;color:#3A2A1C">{{ countHours }}</div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:9px;letter-spacing:1px;color:#8A7458;margin-top:2px">HORES</div>
    </div>
    <div style="flex:1;background:#FFFAF1;border-radius:14px;padding:12px 6px;text-align:center;transform:rotate(-1deg)">
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:26px;color:#3A2A1C">{{ countMins }}</div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:9px;letter-spacing:1px;color:#8A7458;margin-top:2px">MIN</div>
    </div>
    <sc-if value="{{ showSeconds }}" hint-placeholder-val="{{ true }}">
      <div style="flex:1;background:#FFFAF1;border-radius:14px;padding:12px 6px;text-align:center;transform:rotate(2deg)">
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:26px;color:#3A2A1C">{{ countSecs }}</div>
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:9px;letter-spacing:1px;color:#8A7458;margin-top:2px">SEG</div>
      </div>
    </sc-if>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:230},&quot;previewPhase&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;auto&quot;,&quot;tsType&quot;:&quot;'auto'|'open'|'bracket'&quot;,&quot;options&quot;:[&quot;auto&quot;,&quot;open&quot;,&quot;bracket&quot;]},&quot;showSeconds&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  state = { now: Date.now() };

  componentDidMount() {
    this._timer = setInterval(() => this.setState({ now: Date.now() }), 1000);
  }

  componentWillUnmount() {
    clearInterval(this._timer);
  }

  renderVals() {
    const now = new Date(this.state.now);
    const year = now.getFullYear();
    let final = new Date(year, 0, 6, 0, 0, 0);
    if (final.getTime() <= now.getTime()) {
      final = new Date(year + 1, 0, 6, 0, 0, 0);
    }
    const transition = new Date(final.getTime() - 14 * 86400000);

    const forced = this.props.previewPhase;
    const autoPhase = now.getTime() < transition.getTime() ? 'open' : 'bracket';
    const phase = (forced === 'open' || forced === 'bracket') ? forced : autoPhase;
    const target = phase === 'open' ? transition : final;

    const diff = Math.max(0, target.getTime() - now.getTime());
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    const pad = n => String(n).padStart(2, '0');

    return {
      isOpenPhase: phase === 'open',
      isBracketPhase: phase === 'bracket',
      showSeconds: this.props.showSeconds !== false,
      countDays: days,
      countHours: pad(hours),
      countMins: pad(mins),
      countSecs: pad(secs),
    };
  }
}

</script>
</body>
</html>
