<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&display=swap">
<style>
  body{margin:0;background:#E7E0D0;background-image:radial-gradient(1100px 560px at 50% -6%,rgba(255,250,241,.6),rgba(231,224,208,0) 68%);background-attachment:fixed;font-family:'Newsreader',serif}
  .torr-hist-chips::-webkit-scrollbar{display:none}
</style>
</helmet>

<div style="max-width:480px;margin:0 auto;background:#FBF2E3;min-height:100vh;box-shadow:0 0 60px rgba(58,42,28,.12);position:relative;overflow:hidden;display:flex;flex-direction:column" data-screen-label="Voting History">

  <dc-import name="Torrorendum Nav Bar" active-link="historial" hint-size="100%,72px"></dc-import>

  <!-- HEADER -->
  <div style="padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:16px;height:16px;border-left:3px solid #3A2A1C;border-bottom:3px solid #3A2A1C;transform:rotate(45deg)"></div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11px;letter-spacing:.8px;color:#8A7458">TORRORÈNDUM · HISTORIAL</div>
    </div>
    <div style="font:600 10px ui-monospace,Menlo,monospace;color:#6B5A44">{{ totalCountText }}</div>
  </div>

  <div style="padding:14px 24px 0">
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:26px;line-height:1.08;color:#3A2A1C">Historial de vots</div>
    <div style="font-family:'Newsreader',serif;font-style:italic;font-size:13.5px;color:#8A7458;margin-top:4px">Un registre tranquil de cada tria que has fet.</div>
  </div>

  <!-- FILTER CHIPS -->
  <div class="torr-hist-chips" style="display:flex;gap:8px;padding:16px 24px 0;overflow-x:auto;scrollbar-width:none">
    <sc-for list="{{ filters }}" as="f" hint-placeholder-count="6">
      <div onClick="{{ f.select }}" style="{{ f.style }}">{{ f.label }}</div>
    </sc-for>
  </div>

  <!-- LOG LIST -->
  <div style="margin:16px 20px 20px;background:#FFFAF1;border:1px solid #E8D6B4;border-radius:18px;overflow:hidden">
    <sc-for list="{{ rows }}" as="row" hint-placeholder-count="10">

      <sc-if value="{{ row.isHeader }}" hint-placeholder-val="{{ false }}">
        <div style="padding:13px 16px 6px;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:1px;color:#8A7458">{{ row.label }}</div>
      </sc-if>

      <sc-if value="{{ row.isEntry }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;align-items:center;gap:11px;padding:10px 16px;border-bottom:1px solid #F5EBD6">

          <!-- category icon, monochrome -->
          <div style="width:28px;height:28px;border-radius:8px;flex:none;position:relative;display:flex;align-items:center;justify-content:center;background:#F5EBD6;border:1px solid #E8D6B4;overflow:hidden">
            <sc-if value="{{ row.entry.isClassics }}" hint-placeholder-val="{{ false }}">
              <div style="width:13px;height:13px;border-radius:50%;border:2.5px solid #A1907A"></div>
            </sc-if>
            <sc-if value="{{ row.entry.isNovetats }}" hint-placeholder-val="{{ false }}">
              <div style="width:10px;height:10px;background:#A1907A;transform:rotate(45deg);border-radius:2px"></div>
            </sc-if>
            <sc-if value="{{ row.entry.isXocolata }}" hint-placeholder-val="{{ false }}">
              <div style="width:8px;height:8px;background:#A1907A;border-radius:2px;transform:translate(-4px,-4px)"></div>
              <div style="width:8px;height:8px;background:#A1907A;border-radius:2px;position:absolute;transform:translate(4px,4px);opacity:.55"></div>
            </sc-if>
            <sc-if value="{{ row.entry.isNatura }}" hint-placeholder-val="{{ false }}">
              <div style="width:13px;height:13px;border-radius:50%;background:rgba(161,144,122,.55);position:absolute;transform:translate(-3px,-2px)"></div>
              <div style="width:13px;height:13px;border-radius:50%;background:rgba(161,144,122,.35);position:absolute;transform:translate(4px,2px)"></div>
            </sc-if>
            <sc-if value="{{ row.entry.isGlobal }}" hint-placeholder-val="{{ false }}">
              <div style="width:16px;height:16px;border-radius:50%;border:2px solid #A1907A;position:relative"><div style="position:absolute;left:0;right:0;top:50%;height:0;border-top:2px solid #A1907A"></div></div>
            </sc-if>
          </div>

          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:baseline;gap:6px;overflow:hidden;white-space:nowrap">
              <div style="width:5px;height:5px;border-radius:50%;background:#8A2638;flex:none"></div>
              <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:13.5px;color:#3A2A1C;overflow:hidden;text-overflow:ellipsis">{{ row.entry.winner }}</span>
              <span style="font-family:'Newsreader',serif;font-style:italic;font-size:11px;color:#8A7458;flex:none">vs</span>
              <span style="font-family:'Newsreader',serif;font-size:12.5px;color:#6B5A44;text-decoration:line-through;text-decoration-color:#D8C097;overflow:hidden;text-overflow:ellipsis">{{ row.entry.loser }}</span>
            </div>
            <div style="margin-top:3px;font:600 8.5px ui-monospace,Menlo,monospace;color:#6B5A44;letter-spacing:.3px">{{ row.entry.categoryLabel }}</div>
          </div>

          <div style="flex:none;font:600 9.5px ui-monospace,Menlo,monospace;color:#6B5A44">{{ row.entry.time }}</div>
        </div>
      </sc-if>

    </sc-for>

    <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
      <div style="padding:32px 20px;text-align:center">
        <div style="font-family:'Newsreader',serif;font-style:italic;font-size:13px;color:#6B5A44">Encara no hi ha vots en aquesta categoria.</div>
      </div>
    </sc-if>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { filter: 'all' };

  setFilter(key) { this.setState({ filter: key }); }

  renderVals() {
    const s = this.state;

    const CATS = {
      classics: { label: 'Clàssics', flag: 'isClassics' },
      novetats: { label: 'Novetats', flag: 'isNovetats' },
      xocolata: { label: 'Xocolata', flag: 'isXocolata' },
      natura: { label: 'Adrià Natura', flag: 'isNatura' },
      global: { label: 'Global', flag: 'isGlobal' },
    };

    const raw = [
      { day: 'avui', time: '21:04', cat: 'classics', winner: "Torró d'Agramunt", loser: 'Torró de Xixona' },
      { day: 'avui', time: '20:41', cat: 'xocolata', winner: 'Torró de xocolata', loser: 'Massapà' },
      { day: 'avui', time: '19:58', cat: 'novetats', winner: 'Guirlache', loser: 'Torró tou' },
      { day: 'avui', time: '18:20', cat: 'global', winner: 'Torró dur', loser: "Crocant d'ametlla" },
      { day: 'avui', time: '17:03', cat: 'natura', winner: "Praliné d'avellana", loser: 'Torró de coco' },

      { day: 'ahir', time: '22:15', cat: 'classics', winner: 'Torró de Xixona', loser: 'Torró dur' },
      { day: 'ahir', time: '20:33', cat: 'novetats', winner: 'Torró tou', loser: 'Guirlache' },
      { day: 'ahir', time: '19:02', cat: 'xocolata', winner: 'Massapà', loser: 'Torró de xocolata' },
      { day: 'ahir', time: '17:45', cat: 'global', winner: "Crocant d'ametlla", loser: "Praliné d'avellana" },
      { day: 'ahir', time: '14:12', cat: 'natura', winner: 'Torró de coco', loser: "Torró d'Agramunt" },

      { day: '29jun', time: '21:50', cat: 'classics', winner: "Torró d'Agramunt", loser: 'Guirlache' },
      { day: '29jun', time: '20:10', cat: 'xocolata', winner: 'Torró de xocolata', loser: 'Torró tou' },
      { day: '29jun', time: '18:37', cat: 'novetats', winner: 'Guirlache', loser: 'Massapà' },
      { day: '29jun', time: '16:22', cat: 'natura', winner: "Praliné d'avellana", loser: 'Torró dur' },
      { day: '29jun', time: '12:05', cat: 'global', winner: 'Torró de Xixona', loser: "Crocant d'ametlla" },

      { day: '22jun', time: '23:01', cat: 'classics', winner: 'Torró dur', loser: "Torró d'Agramunt" },
      { day: '22jun', time: '21:18', cat: 'xocolata', winner: 'Massapà', loser: 'Torró de coco' },
      { day: '22jun', time: '19:44', cat: 'novetats', winner: 'Torró tou', loser: "Praliné d'avellana" },
      { day: '22jun', time: '15:30', cat: 'global', winner: "Crocant d'ametlla", loser: 'Torró de Xixona' },
      { day: '22jun', time: '11:12', cat: 'natura', winner: 'Torró de xocolata', loser: 'Guirlache' },
    ];

    const dayLabels = { avui: 'AVUI', ahir: 'AHIR', '29jun': '29 DE JUNY', '22jun': '22 DE JUNY' };

    const filtered = s.filter === 'all' ? raw : raw.filter(e => e.cat === s.filter);

    const rows = [];
    let lastDay = null;
    for (const e of filtered) {
      if (e.day !== lastDay) {
        rows.push({ isHeader: true, isEntry: false, label: dayLabels[e.day] });
        lastDay = e.day;
      }
      const catInfo = CATS[e.cat];
      const entry = {
        winner: e.winner,
        loser: e.loser,
        time: e.time,
        categoryLabel: catInfo.label.toUpperCase(),
        isClassics: e.cat === 'classics',
        isNovetats: e.cat === 'novetats',
        isXocolata: e.cat === 'xocolata',
        isNatura: e.cat === 'natura',
        isGlobal: e.cat === 'global',
      };
      rows.push({ isHeader: false, isEntry: true, entry });
    }

    const chipBase = "font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11px;padding:7px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;flex:none;transition:background .18s ease,color .18s ease,border-color .18s ease;";
    const chipStyle = (active) => chipBase + (active
      ? 'background:#3A2A1C;color:#FFFAF1;border:1px solid #3A2A1C'
      : 'background:transparent;color:#8A7458;border:1px solid #E8D6B4');

    const filterDefs = [{ key: 'all', label: 'Tots' }, ...Object.entries(CATS).map(([key, v]) => ({ key, label: v.label }))];
    const filters = filterDefs.map(f => ({
      label: f.label,
      style: chipStyle(s.filter === f.key),
      select: () => this.setFilter(f.key),
    }));

    return {
      rows,
      filters,
      isEmpty: filtered.length === 0,
      totalCountText: `${raw.length} vots totals`,
    };
  }
}

</script>
</body>
</html>
