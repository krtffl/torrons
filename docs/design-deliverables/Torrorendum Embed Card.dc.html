<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap">
<style>
  html,body{margin:0;padding:0;background:transparent}
  *{box-sizing:border-box}
  @keyframes torrCardPulse{0%{box-shadow:0 0 0 0 rgba(138,38,56,.35)}100%{box-shadow:0 0 0 6px rgba(138,38,56,0)}}
  .torr-card-credit:hover{opacity:1 !important}
</style>
</helmet>

<div style="width:100%;max-width:340px;background:{{ t.card }};border:1.5px solid {{ t.border }};border-radius:20px;box-shadow:0 6px 20px rgba(58,42,28,.16),0 2px 0 {{ t.border }};font-family:'Newsreader',Georgia,serif;overflow:hidden;display:flex;flex-direction:column" data-screen-label="Embed Card">

  <!-- header -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px 12px;border-bottom:1px solid {{ t.border }}">
    <div style="display:flex;align-items:center;gap:7px;min-width:0">
      <div style="width:17px;height:17px;border-radius:50%;background:#8A2638;display:flex;align-items:center;justify-content:center;flex:none">
        <div style="width:5.5px;height:5.5px;border-radius:50%;background:#EFC26E"></div>
      </div>
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;color:{{ t.ink }};white-space:nowrap">torrorèndum</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px;background:#E0923F;color:#3A2A1C;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:9px;padding:4px 9px;border-radius:999px;flex:none">
      <sc-if value="{{ t.showLive }}" hint-placeholder-val="{{ true }}">
        <div style="width:5px;height:5px;border-radius:50%;background:#3A2A1C;animation:torrCardPulse 2s ease-out infinite"></div>
      </sc-if>
      EN VIU
    </div>
  </div>
  <div style="padding:10px 16px 2px">
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px;color:{{ t.ink }};line-height:1.1">Classificació</div>
    <div style="font-family:'Newsreader',serif;font-style:italic;font-size:11.5px;color:{{ t.inkMuted }};margin-top:3px">Top 10 de torrons, en directe</div>
  </div>

  <!-- top 3 hero -->
  <div style="margin:12px 14px 0;display:flex;flex-direction:column;gap:6px">
    <sc-for list="{{ heroes }}" as="h" hint-placeholder-count="3">
      <div style="{{ h.rowStyle }}">
        <div style="{{ h.badgeStyle }}">{{ h.rank }}</div>
        <div style="{{ h.swatchStyle }}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:13.5px;color:{{ h.nameColor }};line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ h.name }}</div>
          <div style="font:600 8.5px ui-monospace,Menlo,monospace;color:{{ h.tagColor }};margin-top:2px">{{ h.tag }}</div>
        </div>
        <div style="text-align:right;flex:none">
          <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:13.5px;color:{{ h.nameColor }};line-height:1">{{ h.eloText }}</div>
          <div style="font:600 8px ui-monospace,Menlo,monospace;color:{{ h.tagColor }};margin-top:2px">ELO</div>
        </div>
      </div>
    </sc-for>
  </div>

  <!-- rest of list, 4-10 -->
  <div style="margin:10px 14px 0;background:{{ t.bg }};border:1px solid {{ t.border }};border-radius:14px;overflow:hidden">
    <sc-for list="{{ rest }}" as="item" hint-placeholder-count="7">
      <div style="display:flex;align-items:center;gap:9px;padding:8px 11px;border-bottom:1px solid {{ t.rowBorder }}">
        <div style="width:18px;text-align:center;flex:none;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11px;color:{{ t.inkMuted }}">{{ item.rank }}</div>
        <div style="width:26px;height:26px;border-radius:7px;background:{{ t.swatch }};border:1px solid {{ t.border }};flex:none"></div>
        <div style="flex:1;min-width:0;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:12px;color:{{ t.ink }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ item.name }}</div>
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11.5px;color:{{ t.inkMuted }};flex:none">{{ item.eloText }}</div>
      </div>
    </sc-for>
  </div>

  <!-- persistent credit / link back to source -->
  <a href="https://torrorendum.cat" target="_blank" rel="noopener" class="torr-card-credit" style="display:flex;align-items:center;justify-content:center;gap:5px;margin:12px 0 0;padding:11px 16px;border-top:1px solid {{ t.border }};text-decoration:none;opacity:.85">
    <span style="font-family:'Newsreader',serif;font-style:italic;font-size:11.5px;color:{{ t.inkMuted }}">Veure el rànquing complet a</span>
    <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:11.5px;color:{{ t.ink }}">torrorèndum.cat →</span>
  </a>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:660},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;light&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;tsType&quot;:&quot;'light'|'dark'&quot;,&quot;section&quot;:&quot;Appearance&quot;},&quot;showLiveBadge&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Content&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const isDark = this.props.theme === 'dark';
    const t = isDark
      ? { bg: '#1E1712', card: '#29201A', ink: '#F7EAD3', inkMuted: '#C2AD8C', border: '#4E3C28', rowBorder: '#332119', swatch: 'repeating-linear-gradient(135deg,#332119,#332119 5px,#241812 5px,#241812 10px)', showLive: this.props.showLiveBadge !== false }
      : { bg: '#FBF2E3', card: '#FFFAF1', ink: '#3A2A1C', inkMuted: '#8A7458', border: '#E8D6B4', rowBorder: '#F0E4C8', swatch: 'repeating-linear-gradient(135deg,#F1EFEA,#F1EFEA 5px,#E3E0D6 5px,#E3E0D6 10px)', showLive: this.props.showLiveBadge !== false };

    const raw = [
      { rank: 1, name: "Torró d'Agramunt", tag: 'clàssic', elo: 1928 },
      { rank: 2, name: 'Torró de Xixona', tag: 'suau', elo: 1901 },
      { rank: 3, name: 'Torró dur', tag: 'cruixent', elo: 1844 },
      { rank: 4, name: 'Guirlache', tag: 'cruixent', elo: 1790 },
      { rank: 5, name: 'Torró de xocolata', tag: 'cacau', elo: 1755 },
      { rank: 6, name: 'Massapà', tag: 'ametlla', elo: 1702 },
      { rank: 7, name: 'Torró de coco', tag: 'tropical', elo: 1680 },
      { rank: 8, name: 'Torró tou', tag: 'suau', elo: 1654 },
      { rank: 9, name: "Crocant d'ametlla", tag: 'cruixent', elo: 1602 },
      { rank: 10, name: "Praliné d'avellana", tag: 'cremós', elo: 1560 },
    ];

    const heroes = raw.slice(0, 3).map(r => {
      const isFirst = r.rank === 1;
      const rowBase = 'display:flex;align-items:center;gap:10px;border-radius:13px;padding:9px 10px';
      return {
        rank: r.rank,
        name: r.name,
        tag: r.tag,
        eloText: r.elo.toLocaleString('ca-ES'),
        rowStyle: isFirst
          ? rowBase + ';background:#8A2638;border:1.5px solid #EFC26E'
          : rowBase + `;background:${t.bg};border:1px solid ${t.border}`,
        badgeStyle: `width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:11px;flex:none;` + (isFirst ? 'background:#EFC26E;color:#3A2A1C' : r.rank === 2 ? 'background:#E0923F;color:#3A2A1C' : 'background:#B96F26;color:#FFFAF1'),
        swatchStyle: `width:38px;height:38px;border-radius:9px;flex:none;border:1px solid ${isFirst ? 'rgba(239,194,110,.5)' : t.border};background:` + (isFirst
          ? 'repeating-linear-gradient(135deg,rgba(255,250,241,.14),rgba(255,250,241,.14) 6px,rgba(255,250,241,.05) 6px,rgba(255,250,241,.05) 12px)'
          : 'repeating-linear-gradient(135deg,#F0DFC2,#F0DFC2 6px,#E2CB9E 6px,#E2CB9E 12px)'),
        nameColor: isFirst ? '#FFFAF1' : t.ink,
        tagColor: isFirst ? '#EFC26E' : t.inkMuted,
      };
    });

    const rest = raw.slice(3).map(r => ({ rank: r.rank, name: r.name, eloText: r.elo.toLocaleString('ca-ES') }));

    return { t, heroes, rest };
  }
}

</script>
</body>
</html>
