<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rànquing Torrorèndum</title>
<style>
  :root {
    --embed-accent: #5B1220;
    --embed-cream: #FBF3E7;
    --embed-text: #2B1A12;
    --embed-text-light: #6B5347;
  }
  * {
    box-sizing: border-box;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--embed-cream);
    color: var(--embed-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .widget {
    padding: 10px 12px 8px;
  }
  .widget-title {
    margin: 0 0 8px;
    font-size: 12px;
    font-weight: 700;
    color: var(--embed-accent);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(91, 18, 32, 0.12);
  }
  .entry:last-of-type {
    border-bottom: none;
  }
  .rank {
    flex: 0 0 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--embed-accent);
    text-align: center;
  }
  .thumb {
    flex: 0 0 30px;
    width: 30px;
    height: 30px;
    border-radius: 6px;
    object-fit: cover;
    background: #fff;
  }
  .info {
    flex: 1 1 auto;
    min-width: 0;
  }
  .name {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-track {
    margin-top: 3px;
    height: 5px;
    border-radius: 3px;
    background: rgba(91, 18, 32, 0.12);
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--embed-accent);
    border-radius: 3px;
  }
  .empty {
    font-size: 12px;
    color: var(--embed-text-light);
    padding: 8px 0;
  }
  .attribution {
    margin: 8px 0 0;
    font-size: 10px;
    text-align: right;
    color: var(--embed-text-light);
  }
  .attribution a {
    color: var(--embed-accent);
    font-weight: 700;
    text-decoration: none;
  }
  .attribution a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
  <div class="widget">
    <p class="widget-title">Rànquing Torrorèndum</p>
    {{ if .Entries }}
    {{ range .Entries }}
    <div class="entry">
      <span class="rank">{{ .Rank }}</span>
      <img class="thumb" src="/public/images/{{ .TorronImage }}" alt="{{ .TorronName }}" loading="lazy">
      <div class="info">
        <div class="name">{{ .TorronName }}</div>
        <div class="bar-track"><div class="bar-fill" style="width: {{ .RatingPercentage }}%"></div></div>
      </div>
    </div>
    {{ end }}
    {{ else }}
    <p class="empty">Encara no hi ha dades disponibles.</p>
    {{ end }}
    <p class="attribution"><a href="/" target="_top">Torrorèndum</a> · torro.cat</p>
  </div>
</body>
</html>
